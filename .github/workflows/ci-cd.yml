name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  beta-quality:
    name: Desktop beta quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: TypeScript beta check
        run: npm run typecheck:beta

      - name: Lint beta surface
        run: npm run lint

      - name: Run unit tests with coverage
        run: >
          npx jest
          --coverage
          --coverageReporters=json-summary
          --coverageReporters=json
          --coverageReporters=text

      - name: Upload coverage to Codecov
        if: hashFiles('coverage/coverage-final.json') != ''
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage/coverage-final.json
          flags: beta-unittests
          name: beta-unit-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Report coverage threshold
        shell: bash
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Coverage summary was not generated; skipping threshold report."
            exit 0
          fi

          COVERAGE=$(node -e "const s=require('./coverage/coverage-summary.json'); const pct=Number(s.total?.lines?.pct); console.log(Number.isFinite(pct) ? pct : 'unknown')")
          echo "Line coverage: ${COVERAGE}%"

          if [ "$COVERAGE" = "unknown" ]; then
            echo "Coverage has no instrumented files yet; not blocking the desktop beta PR."
            exit 0
          fi

          node -e "const coverage=Number(process.argv[1]); if (coverage < 80) { console.log('Coverage is below the historical 80% target; not blocking the desktop beta PR.'); }" "$COVERAGE"

      - name: Build frontend
        run: npm run build

      - name: Run Playwright beta smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-beta-report
          path: playwright-beta-report/
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-beta
          path: test-results-beta/
          if-no-files-found: ignore

  status-check:
    name: Pipeline status
    runs-on: ubuntu-latest
    needs: beta-quality
    if: always()

    steps:
      - name: Check job status
        shell: bash
        run: |
          if [ "${{ needs.beta-quality.result }}" != "success" ]; then
            echo "Pipeline failed."
            exit 1
          fi

          echo "Pipeline completed successfully."
