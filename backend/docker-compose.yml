services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bauplan_buddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bauplan_buddy?schema=public
      RABBITMQ_URL: amqp://rabbitmq:5672
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - rabbitmq

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bauplan_buddy?schema=public
      RABBITMQ_URL: amqp://rabbitmq:5672
      PORT: 3001
    depends_on:
      - postgres
      - rabbitmq

