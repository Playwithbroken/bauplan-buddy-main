version: '3.8'

services:
  # Frontend application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # API Gateway (handles Stripe + routes to microservices)
  api-gateway:
    build:
      context: ./backend
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=${VITE_APP_URL:-http://localhost:3000}
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Quote Service
  quote-service:
    build:
      context: ./backend
      dockerfile: services/quote-service/Dockerfile
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bauplan_buddy
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - full

  # Project Service
  project-service:
    build:
      context: ./backend
      dockerfile: services/project-service/Dockerfile
    ports:
      - "4002:4002"
    environment:
      - NODE_ENV=production
      - PORT=4002
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bauplan_buddy
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - full

  # Delivery Service
  delivery-service:
    build:
      context: ./backend
      dockerfile: services/delivery-service/Dockerfile
    ports:
      - "4004:4004"
    environment:
      - NODE_ENV=production
      - PORT=4004
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bauplan_buddy
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - full

  # Invoice Service
  invoice-service:
    build:
      context: ./backend
      dockerfile: services/invoice-service/Dockerfile
    ports:
      - "4005:4005"
    environment:
      - NODE_ENV=production
      - PORT=4005
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bauplan_buddy
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - full

  # Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bauplan_buddy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase-schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: